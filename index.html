<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NexusChat — современный мессенджер</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDK (modular) -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0e1621;
            height: 100vh;
            overflow: hidden;
            color: #e1e9f0;
        }

        /* Анимации */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes messageAppear {
            from {
                opacity: 0;
                transform: scale(0.97);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes subtlePulse {
            0% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(88, 101, 242, 0); }
            100% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0); }
        }

        /* Авторизация */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #17212b 0%, #0e1621 100%);
        }

        .auth-card {
            background: #1f2a36;
            border-radius: 32px;
            padding: 40px 36px;
            width: 420px;
            max-width: 90%;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
            animation: fadeSlideUp 0.5s ease;
            border: 1px solid #2c3a47;
        }

        .auth-card h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 28px;
            text-align: center;
            background: linear-gradient(135deg, #5d9bff, #7e57c2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: #2b3b47;
            border: 1px solid #3d4e5c;
            border-radius: 20px;
            font-size: 15px;
            color: white;
            transition: all 0.2s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #5d9bff;
            box-shadow: 0 0 0 2px rgba(93, 155, 255, 0.2);
        }

        .btn-primary {
            background: #2b70c2;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            background: #3d7ecd;
            transform: scale(0.98);
        }

        .google-btn {
            background: #fff2e0;
            color: #2c3e50;
            margin-top: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .google-btn i {
            font-size: 20px;
        }

        .toggle-auth {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #8e9eae;
            cursor: pointer;
        }

        .toggle-auth span {
            color: #5d9bff;
            font-weight: 500;
        }

        /* ОСНОВНОЙ ИНТЕРФЕЙС */
        .app-container {
            display: none;
            height: 100vh;
            grid-template-columns: 320px 1fr 340px;
            background: #17212b;
        }

        /* Левая панель (профиль + чаты) */
        .sidebar-left {
            background: #1f2a36;
            border-right: 1px solid #2c3a47;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .user-profile-card {
            padding: 24px 20px;
            text-align: center;
            border-bottom: 1px solid #2c3a47;
            background: #17212b;
        }

        .avatar-large {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 12px;
            border: 3px solid #2b70c2;
            transition: 0.2s;
            cursor: pointer;
        }

        .display-name {
            font-size: 20px;
            font-weight: 600;
        }

        .edit-profile-btn {
            background: #2b3b47;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: #a0c0e0;
            font-size: 13px;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #b33;
            color: #ff8a8a;
            margin-top: 12px;
            width: 100%;
        }

        .chat-list {
            flex: 1;
            padding: 12px;
        }

        .chat-item {
            background: #28333f;
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.15s;
            cursor: pointer;
        }

        .chat-item.active {
            background: #2b70c2;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* Центр чата */
        .chat-main {
            display: flex;
            flex-direction: column;
            background: #0e1621;
        }

        .chat-header {
            padding: 18px 24px;
            background: #1f2a36;
            border-bottom: 1px solid #2c3a47;
            font-weight: 600;
            font-size: 18px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: messageAppear 0.25s ease;
            max-width: 85%;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .message-bubble {
            background: #1f2a36;
            border-radius: 20px;
            padding: 10px 16px;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .message-name {
            font-weight: 600;
            font-size: 14px;
            color: #5d9bff;
            margin-bottom: 4px;
        }

        .message-text {
            font-size: 14px;
            line-height: 1.4;
        }

        .message-img {
            max-width: 260px;
            border-radius: 16px;
            margin-top: 6px;
            cursor: pointer;
        }

        .message-time {
            font-size: 10px;
            color: #8e9eae;
            margin-top: 4px;
            text-align: right;
        }

        /* Ввод сообщения */
        .input-area {
            background: #1f2a36;
            padding: 14px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-top: 1px solid #2c3a47;
        }

        .input-area input {
            flex: 1;
            background: #2b3b47;
            border: none;
            padding: 12px 18px;
            border-radius: 30px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .icon-btn {
            background: #2b3b47;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-btn:hover {
            background: #3d4e5c;
            transform: scale(1.02);
        }

        /* Правая панель (профиль) */
        .profile-right {
            background: #1f2a36;
            border-left: 1px solid #2c3a47;
            padding: 28px 20px;
            text-align: center;
            overflow-y: auto;
        }

        .profile-avatar-edit {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
            border: 4px solid #2b70c2;
        }

        .profile-detail {
            background: #2b3b47;
            padding: 12px;
            border-radius: 24px;
            margin: 16px 0;
        }

        /* Модалки */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeSlideUp 0.2s;
        }

        .modal-content {
            background: #1f2a36;
            border-radius: 32px;
            padding: 28px;
            width: 400px;
            max-width: 90%;
        }

        .gif-grid {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 12px;
            max-height: 360px;
            overflow-y: auto;
            margin-top: 16px;
        }

        .gif-item {
            width: 100%;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.1s;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #17212b;
        }
        ::-webkit-scrollbar-thumb {
            background: #2b70c2;
            border-radius: 8px;
        }
        @media (max-width: 860px) {
            .app-container {
                grid-template-columns: 1fr;
            }
            .sidebar-left, .profile-right {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="authSection" class="auth-container">
        <div class="auth-card">
            <h2 id="authTitle">Вход в NexusChat</h2>
            <div id="authForm">
                <div class="input-group"><input type="email" id="email" placeholder="Электронная почта"></div>
                <div class="input-group"><input type="password" id="password" placeholder="Пароль"></div>
                <div id="nameGroup" class="input-group" style="display:none;"><input type="text" id="displayNameReg" placeholder="Имя пользователя"></div>
                <button id="submitAuthBtn" class="btn-primary">Войти</button>
                <button id="googleAuthBtn" class="btn-primary google-btn"><i class="fab fa-google"></i> Продолжить с Google</button>
                <div class="toggle-auth" id="toggleAuthText">Нет аккаунта? <span>Зарегистрироваться</span></div>
            </div>
        </div>
    </div>

    <div id="appMain" class="app-container">
        <div class="sidebar-left">
            <div class="user-profile-card">
                <img id="sidebarAvatar" class="avatar-large" src="https://ui-avatars.com/api/?background=2b70c2&color=fff&bold=true&size=90" alt="avatar">
                <div id="sidebarName" class="display-name">Загрузка...</div>
                <button id="editProfileBtnSide" class="edit-profile-btn"><i class="fas fa-user-edit"></i> Редактировать</button>
                <button id="logoutBtnSide" class="edit-profile-btn logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </div>
            <div class="chat-list">
                <div class="chat-item active">
                    <i class="fas fa-comments" style="font-size: 24px;"></i>
                    <div><strong>Общий чат</strong><br><span style="font-size:12px">Все участники</span></div>
                </div>
            </div>
        </div>
        <div class="chat-main">
            <div class="chat-header"><i class="fas fa-hashtag"></i> Общий чат · Живые сообщения</div>
            <div id="messagesContainer" class="messages-area"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение...">
                <button id="attachPhotoBtn" class="icon-btn"><i class="fas fa-image"></i></button>
                <button id="gifBtn" class="icon-btn"><i class="fas fa-grin-tongue-squint"></i></button>
                <button id="sendMsgBtn" class="icon-btn" style="background:#2b70c2;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <div class="profile-right">
            <img id="rightAvatar" class="profile-avatar-edit" src="https://ui-avatars.com/api/?background=2b70c2&color=fff&bold=true&size=110" alt="avatar">
            <h3 id="rightName">Имя</h3>
            <div class="profile-detail"><i class="fas fa-envelope"></i> <span id="rightEmail">email@example.com</span></div>
            <button id="changeAvatarBtn" class="edit-profile-btn"><i class="fas fa-camera"></i> Сменить аватар</button>
            <button id="changeNameBtn" class="edit-profile-btn" style="margin-top:8px;"><i class="fas fa-pen"></i> Изменить имя</button>
            <input type="file" id="avatarFileInput" accept="image/*" style="display:none">
            <input type="file" id="photoMsgInput" accept="image/*" style="display:none">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, updateProfile, signOut, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, getDoc, setDoc, updateDoc, serverTimestamp } from "firebase/firestore";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "firebase/storage";

        // Конфиг из задания
        const firebaseConfig = {
            apiKey: "AIzaSyAcAC7eXuFFMWOONgldwuSufUzjplM520Q",
            authDomain: "adgbasdbgh.firebaseapp.com",
            databaseURL: "https://adgbasdbgh-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "adgbasdbgh",
            storageBucket: "adgbasdbgh.firebasestorage.app",
            messagingSenderId: "301711812034",
            appId: "1:301711812034:web:68211d2094e108bfb9225b",
            measurementId: "G-VP2ZFDXDQL"
        };
        const CLOUDINARY_CLOUD_NAME = 'dfdgbusqb';
        const CLOUDINARY_UPLOAD_PRESET = '123123';
        const GIPHY_API_KEY = 'hDnKx55fh1OJ0j3QNpLJL8UrjgxXPL90';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        // DOM элементы
        const authSection = document.getElementById('authSection');
        const appMain = document.getElementById('appMain');
        const authTitle = document.getElementById('authTitle');
        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const nameGroup = document.getElementById('nameGroup');
        const displayNameReg = document.getElementById('displayNameReg');
        const submitBtn = document.getElementById('submitAuthBtn');
        const googleBtn = document.getElementById('googleAuthBtn');
        const toggleText = document.getElementById('toggleAuthText');

        let isLogin = true;
        let currentUserData = { uid: null, name: '', avatar: '', email: '' };

        // UI элементы чата
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendMsgBtn');
        const attachPhotoBtn = document.getElementById('attachPhotoBtn');
        const gifBtn = document.getElementById('gifBtn');
        const photoMsgInput = document.getElementById('photoMsgInput');
        const avatarFileInput = document.getElementById('avatarFileInput');
        const changeAvatarBtn = document.getElementById('changeAvatarBtn');
        const changeNameBtn = document.getElementById('changeNameBtn');
        const logoutBtn = document.getElementById('logoutBtnSide');
        const editProfileBtnSide = document.getElementById('editProfileBtnSide');
        const sidebarAvatar = document.getElementById('sidebarAvatar');
        const sidebarName = document.getElementById('sidebarName');
        const rightAvatar = document.getElementById('rightAvatar');
        const rightName = document.getElementById('rightName');
        const rightEmail = document.getElementById('rightEmail');

        // Переключение формы
        toggleText.addEventListener('click', () => {
            isLogin = !isLogin;
            if(isLogin) {
                authTitle.innerText = 'Вход в NexusChat';
                submitBtn.innerText = 'Войти';
                toggleText.innerHTML = 'Нет аккаунта? <span>Зарегистрироваться</span>';
                nameGroup.style.display = 'none';
            } else {
                authTitle.innerText = 'Регистрация';
                submitBtn.innerText = 'Создать аккаунт';
                toggleText.innerHTML = 'Уже есть аккаунт? <span>Войти</span>';
                nameGroup.style.display = 'block';
            }
        });

        // Авторизация email/pass
        submitBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const pass = passInput.value.trim();
            if(!email || !pass) return alert('Заполните поля');
            try {
                if(isLogin) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const display = displayNameReg.value.trim();
                    if(!display) return alert('Введите имя');
                    const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(userCred.user, { displayName: display, photoURL: `https://ui-avatars.com/api/?background=2b70c2&color=fff&name=${encodeURIComponent(display)}` });
                    // создаём документ в Firestore
                    await setDoc(doc(db, "users", userCred.user.uid), {
                        uid: userCred.user.uid,
                        email: email,
                        displayName: display,
                        photoURL: `https://ui-avatars.com/api/?background=2b70c2&color=fff&name=${encodeURIComponent(display)}`,
                        createdAt: serverTimestamp()
                    });
                }
            } catch(e) { alert('Ошибка: ' + e.message); }
        });

        googleBtn.addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                if(!snap.exists()) {
                    await setDoc(userRef, {
                        uid: user.uid,
                        email: user.email,
                        displayName: user.displayName || user.email.split('@')[0],
                        photoURL: user.photoURL || `https://ui-avatars.com/api/?background=2b70c2&color=fff&name=${encodeURIComponent(user.displayName || 'user')}`,
                        createdAt: serverTimestamp()
                    });
                }
            } catch(e) { alert('Google error: ' + e.message); }
        });

        // Обновление UI профиля
        async function refreshUserProfile(user) {
            if(!user) return;
            const userDoc = await getDoc(doc(db, "users", user.uid));
            let data = userDoc.exists() ? userDoc.data() : { displayName: user.displayName || user.email, photoURL: user.photoURL };
            currentUserData = { uid: user.uid, name: data.displayName, avatar: data.photoURL, email: user.email };
            sidebarName.innerText = currentUserData.name;
            sidebarAvatar.src = currentUserData.avatar || `https://ui-avatars.com/api/?background=2b70c2&color=fff&name=${encodeURIComponent(currentUserData.name)}`;
            rightAvatar.src = currentUserData.avatar || sidebarAvatar.src;
            rightName.innerText = currentUserData.name;
            rightEmail.innerText = currentUserData.email;
        }

        // Загрузка аватарки в Storage
        async function uploadAvatar(file, userId) {
            const storageRef = ref(storage, `avatars/${userId}`);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            await updateProfile(auth.currentUser, { photoURL: url });
            await setDoc(doc(db, "users", userId), { photoURL: url, displayName: currentUserData.name }, { merge: true });
            refreshUserProfile(auth.currentUser);
        }

        changeAvatarBtn.addEventListener('click', () => avatarFileInput.click());
        avatarFileInput.addEventListener('change', async (e) => {
            if(e.target.files[0] && auth.currentUser) {
                await uploadAvatar(e.target.files[0], auth.currentUser.uid);
                alert('Аватар обновлён!');
            }
        });

        changeNameBtn.addEventListener('click', async () => {
            let newName = prompt('Новое имя:', currentUserData.name);
            if(newName && newName.trim() && auth.currentUser) {
                await updateProfile(auth.currentUser, { displayName: newName });
                await setDoc(doc(db, "users", auth.currentUser.uid), { displayName: newName }, { merge: true });
                refreshUserProfile(auth.currentUser);
            }
        });

        // Отправка сообщения (текст / фото / GIF)
        async function sendMessage(content, type = 'text', mediaUrl = null) {
            if(!auth.currentUser) return;
            let messageData = {
                userId: auth.currentUser.uid,
                userName: currentUserData.name,
                userAvatar: currentUserData.avatar || `https://ui-avatars.com/api/?background=2b70c2&color=fff&name=${encodeURIComponent(currentUserData.name)}`,
                timestamp: serverTimestamp(),
                type: type
            };
            if(type === 'text') messageData.text = content;
            if(type === 'image') messageData.imageUrl = mediaUrl;
            if(type === 'gif') messageData.gifUrl = mediaUrl;
            await addDoc(collection(db, "messages"), messageData);
        }

        // Загрузка фото в Cloudinary
        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            return data.secure_url;
        }

        attachPhotoBtn.addEventListener('click', () => photoMsgInput.click());
        photoMsgInput.addEventListener('change', async (e) => {
            if(e.target.files[0]) {
                const file = e.target.files[0];
                const url = await uploadToCloudinary(file);
                await sendMessage('', 'image', url);
                photoMsgInput.value = '';
            }
        });

        sendBtn.addEventListener('click', async () => {
            let text = messageInput.value.trim();
            if(text) {
                await sendMessage(text, 'text');
                messageInput.value = '';
            }
        });
        messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendBtn.click(); });

        // GIPHY модалка
        function showGiphyModal() {
            const modalDiv = document.createElement('div');
            modalDiv.className = 'modal';
            modalDiv.innerHTML = `
                <div class="modal-content">
                    <h3>Выберите GIF <i class="fas fa-smile-wink"></i></h3>
                    <input type="text" id="gifSearchInput" placeholder="Поиск..." style="width:100%; padding:10px; margin:12px 0; border-radius:20px; border:none;">
                    <div id="gifResults" class="gif-grid"></div>
                    <button id="closeGifModal" class="edit-profile-btn" style="margin-top:12px;">Закрыть</button>
                </div>
            `;
            document.body.appendChild(modalDiv);
            const searchInput = modalDiv.querySelector('#gifSearchInput');
            const resultsDiv = modalDiv.querySelector('#gifResults');
            async function searchGiphy(query = 'trending') {
                let url = query ? `https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_API_KEY}&q=${encodeURIComponent(query)}&limit=18` : `https://api.giphy.com/v1/gifs/trending?api_key=${GIPHY_API_KEY}&limit=18`;
                const res = await fetch(url);
                const data = await res.json();
                resultsDiv.innerHTML = '';
                data.data.forEach(gif => {
                    const img = document.createElement('img');
                    img.src = gif.images.fixed_height_small.url;
                    img.className = 'gif-item';
                    img.addEventListener('click', async () => {
                        await sendMessage('', 'gif', gif.images.original.url);
                        modalDiv.remove();
                    });
                    resultsDiv.appendChild(img);
                });
            }
            searchGiphy('');
            searchInput.addEventListener('input', () => searchGiphy(searchInput.value));
            modalDiv.querySelector('#closeGifModal').onclick = () => modalDiv.remove();
        }
        gifBtn.addEventListener('click', showGiphyModal);

        // Отображение сообщений реального времени
        let unsubscribeMessages = null;
        function subscribeMessages() {
            if(unsubscribeMessages) unsubscribeMessages();
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                messagesContainer.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message';
                    msgDiv.innerHTML = `
                        <img class="message-avatar" src="${data.userAvatar || 'https://ui-avatars.com/api/?background=2b70c2&color=fff'}" alt="avatar">
                        <div class="message-bubble" style="max-width:100%">
                            <div class="message-name">${escapeHtml(data.userName)}</div>
                            <div class="message-text">
                                ${data.text ? escapeHtml(data.text) : ''}
                                ${data.imageUrl ? `<img src="${data.imageUrl}" class="message-img" onclick="window.open('${data.imageUrl}','_blank')">` : ''}
                                ${data.gifUrl ? `<img src="${data.gifUrl}" class="message-img" style="max-width:200px;" onclick="window.open('${data.gifUrl}','_blank')">` : ''}
                            </div>
                            <div class="message-time">${data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '...'}</div>
                        </div>
                    `;
                    messagesContainer.appendChild(msgDiv);
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

        // Выход
        logoutBtn.addEventListener('click', async () => { await signOut(auth); });
        editProfileBtnSide.addEventListener('click', () => { changeNameBtn.click(); });

        // Следим за состоянием аутентификации
        onAuthStateChanged(auth, async (user) => {
            if(user) {
                authSection.style.display = 'none';
                appMain.style.display = 'grid';
                await refreshUserProfile(user);
                subscribeMessages();
                // слушатель обновления профиля в firestore
                const unsubUser = onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if(docSnap.exists()) refreshUserProfile(user);
                });
                window.unsubUserFire = unsubUser;
            } else {
                authSection.style.display = 'flex';
                appMain.style.display = 'none';
                if(unsubscribeMessages) unsubscribeMessages();
                if(window.unsubUserFire) window.unsubUserFire();
                emailInput.value = '';
                passInput.value = '';
                displayNameReg.value = '';
            }
        });
        // Инициализация мелких анимаций, плавный скролл
        const styleAnim = document.createElement('style');
        styleAnim.textContent = `.message { transition: all 0.2s; } .icon-btn:active { transform: scale(0.94); }`;
        document.head.appendChild(styleAnim);
    </script>
</body>
</html>
