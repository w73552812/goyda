<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NovaChat — Современный мессенджер</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
  <style>
    :root {
      --bg-primary: #0f1419;
      --bg-secondary: #1a1f2e;
      --bg-tertiary: #252b3b;
      --bg-hover: #2d3748;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --border: #2d3748;
      --online: #10b981;
      --danger: #ef4444;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 8px 30px rgba(0,0,0,0.5);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes messagePop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ---------- AUTH ---------- */
    .auth-screen {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; background: radial-gradient(circle at top, #1e293b, #0f1419);
    }
    .auth-card {
      background: var(--bg-secondary); border-radius: 24px;
      padding: 40px 36px; width: 420px; max-width: 90vw;
      box-shadow: var(--shadow); border: 1px solid var(--border);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo i { font-size: 56px; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .auth-logo h2 { font-size: 26px; font-weight: 700; margin-top: 12px; color: var(--text-primary); }
    .auth-logo p { color: var(--text-secondary); font-size: 14px; margin-top: 6px; }

    .btn-google {
      width: 100%; padding: 14px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--bg-tertiary); color: var(--text-primary); margin-bottom: 18px;
    }
    .btn-google:hover { background: var(--bg-hover); transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }

    .divider { display: flex; align-items: center; color: var(--text-secondary); font-size: 13px; margin: 22px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { padding: 0 12px; }

    .auth-tabs { display: flex; background: var(--bg-tertiary); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 24px; }
    .auth-tab { flex: 1; padding: 10px; text-align: center; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-secondary); transition: var(--transition); }
    .auth-tab.active { background: var(--accent); color: white; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
    .form-input {
      width: 100%; padding: 12px 16px; background: var(--bg-tertiary); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-primary); font-size: 15px; outline: none; transition: var(--transition);
    }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }

    .btn {
      width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); }

    /* ---------- MAIN APP ---------- */
    .app { display: none; height: 100vh; }
    .app.active { display: flex; animation: fadeIn 0.5s ease; }

    .sidebar {
      width: 340px; background: var(--bg-secondary); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .sidebar-header {
      padding: 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border);
    }
    .search-box { flex: 1; position: relative; }
    .search-box input {
      width: 100%; padding: 10px 16px 10px 44px; background: var(--bg-tertiary); border: 1px solid var(--border);
      border-radius: 24px; color: var(--text-primary); font-size: 14px; outline: none;
    }
    .search-box i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }

    .chat-list { flex: 1; overflow-y: auto; padding: 8px; }
    .chat-item {
      display: flex; align-items: center; padding: 12px; border-radius: var(--radius);
      cursor: pointer; transition: var(--transition); gap: 12px;
    }
    .chat-item:hover { background: var(--bg-hover); }
    .chat-item.active { background: rgba(59,130,246,0.1); border: 1px solid var(--accent); }
    .chat-avatar {
      width: 48px; height: 48px; border-radius: 50%; background: var(--accent-gradient);
      display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 18px; flex-shrink: 0;
    }
    .chat-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-last-msg { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-time { font-size: 12px; color: var(--text-secondary); }

    .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); }
    .chat-header {
      padding: 16px 24px; background: var(--bg-secondary); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message {
      max-width: 70%; padding: 10px 16px; border-radius: 18px;
      background: var(--bg-tertiary); animation: messagePop 0.3s ease;
    }
    .message img, .message video { max-width: 240px; border-radius: 12px; margin: 6px 0; cursor: pointer; }
    .message-input-area {
      padding: 16px 20px; background: var(--bg-secondary); border-top: 1px solid var(--border);
      display: flex; gap: 12px; align-items: center;
    }
    .message-input-area input {
      flex: 1; padding: 12px 20px; background: var(--bg-tertiary); border: 1px solid var(--border);
      border-radius: 24px; color: var(--text-primary); font-size: 15px; outline: none;
    }
    .send-btn {
      width: 44px; height: 44px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 18px; cursor: pointer;
    }
    .send-btn:hover { background: var(--accent-hover); }

    @media (max-width: 768px) {
      .sidebar { width: 100%; position: absolute; z-index: 10; }
      .chat-area { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="fas fa-comments"></i>
        <h2>NovaChat</h2>
        <p>Быстрый, безопасный, красивый</p>
      </div>
      <button class="btn-google" id="googleSignInBtn"><i class="fab fa-google"></i> Войти через Google</button>
      <div class="divider"><span>или</span></div>
      <div class="auth-tabs" id="authTabs">
        <div class="auth-tab active" data-tab="login">Вход</div>
        <div class="auth-tab" data-tab="register">Регистрация</div>
      </div>
      <form id="loginForm" class="auth-form active">
        <div class="form-group"><label>Email</label><input type="email" class="form-input" id="loginEmail" required></div>
        <div class="form-group"><label>Пароль</label><input type="password" class="form-input" id="loginPassword" required></div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-sign-in-alt"></i> Войти</button>
      </form>
      <form id="registerForm" class="auth-form" style="display:none;">
        <div class="form-group"><label>Имя</label><input type="text" class="form-input" id="regName" required></div>
        <div class="form-group"><label>Имя пользователя</label><input type="text" class="form-input" id="regUsername" placeholder="username" required></div>
        <div class="form-group"><label>Email</label><input type="email" class="form-input" id="regEmail" required></div>
        <div class="form-group"><label>Пароль</label><input type="password" class="form-input" id="regPassword" minlength="6" required></div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-user-plus"></i> Создать</button>
      </form>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="app">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchChats" placeholder="Поиск чатов..." oninput="renderChats()"></div>
        <button style="background:none;border:none;color:var(--text-secondary);font-size:18px;cursor:pointer;" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
      </div>
      <div class="chat-list" id="chatList"></div>
    </div>
    <div class="chat-area">
      <div id="noChat" style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);">Выберите чат чтобы начать общение</div>
      <div id="activeChat" style="display:none;flex:1;flex-direction:column;">
        <div class="chat-header">
          <div style="display:flex;align-items:center;gap:12px;">
            <div class="chat-avatar" id="activeChatAvatar"></div>
            <div id="activeChatName" style="font-weight:600;"></div>
          </div>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="message-input-area">
          <input type="text" id="messageInput" placeholder="Сообщение..." onkeydown="handleMessageKey(event)">
          <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    // ================== КОНФИГУРАЦИЯ (ТЕ ЖЕ API) ==================
    const firebaseConfig = {
      apiKey: "AIzaSyAcAC7eXuFFMWOONgldwuSufUzjplM520Q",
      authDomain: "adgbasdbgh.firebaseapp.com",
      databaseURL: "https://adgbasdbgh-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "adgbasdbgh",
      storageBucket: "adgbasdbgh.firebasestorage.app",
      messagingSenderId: "301711812034",
      appId: "1:301711812034:web:68211d2094e108bfb9225b",
      measurementId: "G-VP2ZFDXDQL"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    const CLOUDINARY_CLOUD_NAME = 'dfdgbusqb';
    const CLOUDINARY_UPLOAD_PRESET = '123123';

    // ================== СОСТОЯНИЕ ПРИЛОЖЕНИЯ ==================
    let currentUser = null;
    let currentUserData = null;
    let chats = [];
    let activeChatId = null;
    let messagesListener = null;

    // ================== АВТОРИЗАЦИЯ ==================
    document.getElementById('googleSignInBtn').addEventListener('click', async () => {
      try {
        const result = await auth.signInWithPopup(googleProvider);
        await handleUser(result.user);
      } catch (e) { showToast(e.message, 'error'); }
    });

    document.getElementById('authTabs').addEventListener('click', (e) => {
      if (e.target.classList.contains('auth-tab')) {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        const tab = e.target.dataset.tab;
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPassword').value;
      try {
        const cred = await auth.signInWithEmailAndPassword(email, pass);
        await handleUser(cred.user);
      } catch (err) { showToast(err.message, 'error'); }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('regName').value.trim();
      const username = document.getElementById('regUsername').value.trim().toLowerCase();
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPassword').value;
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await db.collection('users').doc(cred.user.uid).set({
          name, username, email, photoURL: '', bio: '', online: true, createdAt: new Date()
        });
        await db.collection('usernames').doc(username).set({ uid: cred.user.uid });
        await handleUser(cred.user);
      } catch (err) { showToast(err.message, 'error'); }
    });

    async function handleUser(user) {
      currentUser = user;
      const userDoc = await db.collection('users').doc(user.uid).get();
      if (!userDoc.exists) {
        // на случай входа через Google без записи
        const defName = user.displayName || 'Пользователь';
        const username = 'user_' + Math.random().toString(36).substr(2, 8);
        await db.collection('users').doc(user.uid).set({
          name: defName, username, email: user.email, photoURL: user.photoURL || '', bio: '', online: true, createdAt: new Date()
        });
        await db.collection('usernames').doc(username).set({ uid: user.uid });
        currentUserData = { name: defName, username, email: user.email, photoURL: user.photoURL || '' };
      } else {
        currentUserData = userDoc.data();
        await db.collection('users').doc(user.uid).update({ online: true });
      }
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('mainApp').classList.add('active');
      loadChats();
    }

    async function logout() {
      if (currentUser) await db.collection('users').doc(currentUser.uid).update({ online: false });
      await auth.signOut();
      location.reload();
    }

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        const doc = await db.collection('users').doc(user.uid).get();
        if (doc.exists) {
          currentUserData = doc.data();
          await db.collection('users').doc(user.uid).update({ online: true });
          document.getElementById('authScreen').style.display = 'none';
          document.getElementById('mainApp').classList.add('active');
          loadChats();
        }
      } else {
        document.getElementById('authScreen').style.display = 'flex';
        document.getElementById('mainApp').classList.remove('active');
      }
    });

    // ================== ЧАТЫ ==================
    async function loadChats() {
      const uid = currentUser.uid;
      db.collection('chats').where('members', 'array-contains', uid).get()
        .then(async (snap) => {
          chats = [];
          for (const doc of snap.docs) {
            const data = doc.data();
            const otherIds = data.members.filter(m => m !== uid);
            const otherUsers = [];
            for (const oid of otherIds) {
              const uDoc = await db.collection('users').doc(oid).get();
              if (uDoc.exists) otherUsers.push({ uid: oid, ...uDoc.data() });
            }
            chats.push({ id: doc.id, ...data, otherUsers });
          }
          // сортировка по времени последнего сообщения
          chats.sort((a, b) => {
            const aTime = a.lastMessageTime?.toDate?.()?.getTime() || 0;
            const bTime = b.lastMessageTime?.toDate?.()?.getTime() || 0;
            return bTime - aTime;
          });
          renderChats();
        });
    }

    function renderChats() {
      const list = document.getElementById('chatList');
      const search = document.getElementById('searchChats')?.value.toLowerCase() || '';
      const filtered = chats.filter(c => getChatName(c).toLowerCase().includes(search));
      list.innerHTML = filtered.map(chat => `
        <div class="chat-item ${activeChatId === chat.id ? 'active' : ''}" onclick="openChat('${chat.id}')">
          <div class="chat-avatar">${getChatAvatar(chat)}</div>
          <div class="chat-info">
            <div class="chat-name">${getChatName(chat)}</div>
            <div class="chat-last-msg">${chat.lastMessage || 'Нет сообщений'}</div>
          </div>
          <div class="chat-time">${formatTime(chat.lastMessageTime)}</div>
        </div>
      `).join('');
    }

    function getChatName(chat) {
      if (chat.type === 'private' && chat.otherUsers?.[0]) return chat.otherUsers[0].name;
      return chat.name || 'Безымянный';
    }

    function getChatAvatar(chat) {
      if (chat.type === 'private' && chat.otherUsers?.[0]?.photoURL)
        return `<img src="${chat.otherUsers[0].photoURL}" alt="">`;
      return getChatName(chat).charAt(0).toUpperCase();
    }

    function openChat(chatId) {
      activeChatId = chatId;
      document.getElementById('noChat').style.display = 'none';
      document.getElementById('activeChat').style.display = 'flex';
      const chat = chats.find(c => c.id === chatId);
      if (chat) {
        document.getElementById('activeChatName').textContent = getChatName(chat);
        const avatarEl = document.getElementById('activeChatAvatar');
        if (chat.type === 'private' && chat.otherUsers?.[0]?.photoURL) {
          avatarEl.innerHTML = `<img src="${chat.otherUsers[0].photoURL}" alt="">`;
        } else {
          avatarEl.innerHTML = getChatName(chat).charAt(0).toUpperCase();
        }
      }
      if (messagesListener) messagesListener();
      messagesListener = db.collection('chats').doc(chatId).collection('messages')
        .orderBy('timestamp', 'asc')
        .onSnapshot(snap => {
          const messages = [];
          snap.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
          renderMessages(messages);
        });
      renderChats();
    }

    function renderMessages(messages) {
      const container = document.getElementById('messagesContainer');
      container.innerHTML = messages.map(m => {
        const time = m.timestamp?.toDate ? formatTime(m.timestamp.toDate()) : '';
        return `<div class="message">
          <div style="font-weight:600;color:var(--accent);margin-bottom:4px;">${m.senderName}</div>
          <div>${m.text || ''}</div>
          ${m.imageUrl ? `<img src="${m.imageUrl}" onclick="window.open('${m.imageUrl}')" loading="lazy">` : ''}
          <div style="font-size:11px;opacity:0.6;margin-top:6px;">${time}</div>
        </div>`;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !activeChatId) return;
      await db.collection('chats').doc(activeChatId).collection('messages').add({
        senderId: currentUser.uid,
        senderName: currentUserData.name,
        text, type: 'text',
        timestamp: new Date()
      });
      await db.collection('chats').doc(activeChatId).update({
        lastMessage: text.substring(0, 50),
        lastMessageTime: new Date()
      });
      input.value = '';
    }

    function handleMessageKey(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    }

    function formatTime(timestamp) {
      if (!timestamp) return '';
      const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
      return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }

    function showToast(msg, type = 'info') {
      alert(msg); // простой вариант, можно заменить на кастомный тост
    }

    // ================== ЗАГРУЗКА МЕДИА (CLOUDINARY) ==================
    async function uploadImage(file) {
      const form = new FormData();
      form.append('file', file);
      form.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method: 'POST', body: form });
      const data = await res.json();
      return data.secure_url;
    }

    // для примера: отправка фото через кнопку (можно добавить в интерфейс)
    window.sendPhoto = async () => {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = 'image/*';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file || !activeChatId) return;
        const url = await uploadImage(file);
        await db.collection('chats').doc(activeChatId).collection('messages').add({
          senderId: currentUser.uid, senderName: currentUserData.name,
          type: 'image', imageUrl: url, timestamp: new Date()
        });
      };
      input.click();
    };

    // Загрузка аудио/файлов реализуется аналогично с resource_type = 'video' или 'raw'
  </script>
</body>
</html>
